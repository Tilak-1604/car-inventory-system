spring.application.name=inventory

# ─── PostgreSQL Database ────────────────────────────────────────────────────
# Override these with environment variables in production:
#   SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/dealership_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:tilak1604}
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── JPA / Hibernate ────────────────────────────────────────────────────────
# 'update' — applies schema changes without dropping data (safe for dev/demo)
# Use 'validate' or Flyway/Liquibase in production
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ─── Server ─────────────────────────────────────────────────────────────────
server.port=9090

# ─── JWT ────────────────────────────────────────────────────────────────────
# Override in production with environment variable: APP_JWT_SECRET
app.jwt.secret=${APP_JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
app.jwt.expiration-ms=86400000
